name: Deploy (Docker)

on:
  push:
    branches: [main]
    paths: ['backend/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/Tickr/backend
            git fetch origin main
            git reset --hard origin/main
            echo "Setting environment variables"
            echo "${{ secrets.ENV }}" > .env
            # Ensure promtail config exists as a file (it's gitignored; otherwise Docker creates a dir and mount fails)
            echo "Setting promtail config"
            if [ ! -f promtail-config.yml ]; then
              [ -d promtail-config.yml ] && rm -rf promtail-config.yml
              echo "${{ secrets.PROMTAIL_CONFIG_YML }}" > promtail-config.yml
            fi
            docker compose -f compose.yml up -d --build --remove-orphans
