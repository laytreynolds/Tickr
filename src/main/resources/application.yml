spring:
  application:
    name: Tickr
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tickr}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
      dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  management:
    endpoints:
      web:
        exposure:
          include: health,metrics
scheduler:
